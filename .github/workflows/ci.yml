name: Integracion Continua Mate

# 2. El Evento: que arranque cada vez que haga un "push" a la rama "main".
on:
  push:
    branches: [ "main" ]

# 3. Los Trabajos (Jobs)
jobs:
  build-y-test:
    # 4. El Entorno: Le pedimos a GitHub que nos preste una PC con Linux (Ubuntu).
    runs-on: ubuntu-latest

    # 5. Las Tareas (Steps): cada paso es una tarea que se ejecuta en la máquina virtual.
    steps:
    - name: Paso 1 - Clonar el código
      uses: actions/checkout@v4 # Esta es una acción prearmada que descarga tu código a la máquina virtual.

    - name: Paso 2 - Preparar la máquina con Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Instalamos la versión de Python.

    - name: Paso 3 - Ejecutar nuestra prueba automatizada
      # Acá escribimos el mismo comando de consola que usaste en tu Build Local.
      run: python -m unittest test_mate.py

    - name: Paso 4 - Empaquetar la aplicación con Docker
      run: docker build -t app-mate-flask .
    
    - name: Mecanismo de Feedback - Notificar al Equipo en Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,status # Los datos que va a mostrar el mensaje
      env:
        # Esto lee un link secreto que guardás en la configuración de GitHub
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} 
      if: always() # Fundamental: Le decimos que mande el mensaje SIEMPRE, incluso si el paso anterior falló (para avisar del error)